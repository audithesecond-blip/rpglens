<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RPGLens — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:        #0e0f0f;
  --bg2:       #141516;
  --bg3:       #1a1c1d;
  --border:    #2a2d2e;
  --border2:   #363a3b;
  --amber:     #e8a020;
  --amber2:    #f5c060;
  --amber-dim: #7a5010;
  --green:     #2ec27e;
  --red:       #e85050;
  --red-dim:   #4a1515;
  --text:      #e8e4dc;
  --text2:     #9a9690;
  --text3:     #5a5855;
  --mono:      'DM Mono', monospace;
  --display:   'Syne', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(#2a2d2e 1px, transparent 1px),
    linear-gradient(90deg, #2a2d2e 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.2;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 100%);
}

/* amber glow */
body::after {
  content: '';
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  width: 500px;
  height: 300px;
  background: radial-gradient(ellipse, rgba(232,160,32,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.auth-card {
  width: 100%;
  max-width: 420px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  padding: 40px 36px;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.5s ease both;
}

.auth-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--amber), transparent);
}

.auth-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  margin-bottom: 32px;
}

.logo-mark svg { width: 28px; height: 28px; }

.logo-text {
  font-family: var(--display);
  font-weight: 800;
  font-size: 20px;
  color: var(--text);
  letter-spacing: -0.02em;
}
.logo-text span { color: var(--amber); }

.auth-title {
  font-family: var(--display);
  font-weight: 800;
  font-size: 24px;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  color: var(--text);
}

.auth-sub {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 28px;
  line-height: 1.6;
}

/* Google button */
.google-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--display);
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
  margin-bottom: 20px;
}

.google-btn:hover {
  border-color: var(--amber-dim);
  background: rgba(232,160,32,0.04);
}

.google-icon {
  width: 18px; height: 18px;
  flex-shrink: 0;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.divider span {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
}

/* Form fields */
.field { margin-bottom: 14px; }

.field label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus { border-color: var(--amber-dim); }
.field input::placeholder { color: var(--text3); }

.field input.error { border-color: var(--red); }

/* Submit button */
.submit-btn {
  width: 100%;
  padding: 13px;
  background: var(--amber);
  color: var(--bg);
  border: none;
  font-family: var(--display);
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 0.06em;
  cursor: pointer;
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  transition: all 0.2s;
  margin-top: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-transform: uppercase;
}

.submit-btn:hover:not(:disabled) {
  background: var(--amber2);
  transform: translateY(-1px);
}

.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.submit-btn .spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(14,15,15,0.3);
  border-top-color: var(--bg);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}

.submit-btn.loading .spinner { display: block; }

/* Error / success messages */
.msg {
  display: none;
  padding: 10px 14px;
  font-size: 12px;
  margin-bottom: 14px;
  line-height: 1.5;
  letter-spacing: 0.02em;
}

.msg.error {
  background: rgba(232,80,80,0.08);
  border: 1px solid rgba(232,80,80,0.3);
  color: var(--red);
}

.msg.success {
  background: rgba(46,194,126,0.08);
  border: 1px solid rgba(46,194,126,0.3);
  color: var(--green);
}

.auth-footer {
  margin-top: 24px;
  text-align: center;
  font-size: 12px;
  color: var(--text3);
}

.auth-footer a {
  color: var(--amber);
  text-decoration: none;
  transition: color 0.2s;
}

.auth-footer a:hover { color: var(--amber2); }

.forgot-link {
  display: block;
  text-align: right;
  font-size: 11px;
  color: var(--text3);
  text-decoration: none;
  margin-top: 4px;
  transition: color 0.2s;
}

.forgot-link:hover { color: var(--amber); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="auth-card">
  <a href="/" class="auth-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="30" height="30" stroke="#2a2d2e" stroke-width="1"/>
        <rect x="4" y="4" width="11" height="11" fill="#e8a020" opacity="0.9"/>
        <rect x="17" y="4" width="11" height="11" fill="#2a2d2e"/>
        <rect x="4" y="17" width="11" height="11" fill="#2a2d2e"/>
        <rect x="17" y="17" width="11" height="11" fill="#e8a020" opacity="0.4"/>
        <line x1="1" y1="16" x2="31" y2="16" stroke="#e8a020" stroke-width="0.5" opacity="0.4"/>
        <line x1="16" y1="1" x2="16" y2="31" stroke="#e8a020" stroke-width="0.5" opacity="0.4"/>
      </svg>
    </div>
    <span class="logo-text">RPG<span>Lens</span></span>
  </a>

  <h1 class="auth-title">Welcome back</h1>
  <p class="auth-sub">Sign in to your RPGLens account to continue analysing IBM i code.</p>

  <!-- Messages -->
  <div class="msg" id="msg"></div>

  <!-- Google -->
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider"><span>or sign in with email</span></div>

  <!-- Email form -->
  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') submitLogin()"/>
    <a href="/forgot-password" class="forgot-link">Forgot password?</a>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitLogin()">
    <div class="spinner"></div>
    <span class="btn-label">Sign in</span>
  </button>

  <div class="auth-footer">
    Don't have an account? <a href="/signup">Create one free</a>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  window.RPGLENS_CONFIG.SUPABASE_URL,
  window.RPGLENS_CONFIG.SUPABASE_ANON
);

// If already logged in, redirect to dashboard
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = '/dashboard';
});

function showMsg(text, type = 'error') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

function setLoading(on) {
  const btn = document.getElementById('submit-btn');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
  btn.querySelector('.btn-label').textContent = on ? 'Signing in...' : 'Sign in';
}

async function signInWithGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard' }
  });
  if (error) showMsg(error.message);
}

async function submitLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showMsg('Please enter your email and password.');
    return;
  }

  setLoading(true);

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    setLoading(false);
    const msgs = {
      'Invalid login credentials': 'Incorrect email or password. Try again or reset your password.',
      'Email not confirmed': 'Please check your email and click the confirmation link first.',
    };
    showMsg(msgs[error.message] || error.message);
  } else {
    window.location.href = '/dashboard';
  }
}
</script>
</body>
</html>
